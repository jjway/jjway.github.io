    <style>
        .ih-item .info .info-back {
            /* * 1. 将背景改为半透明的白色。
         * rgba(255, 255, 255, 0.1) 最后一个 0.1 代表 10% 的不透明度。
         * 您可以按喜好调整这个值（例如 0.2 或 0.3）。
        */
            background: rgba(255, 255, 255, 0.1) !important;

            /* * 2. 添加背景模糊滤镜。
         * blur(10px) 中的 10px 是模糊半径, 您可以改成 5px, 20px 等。

            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            /* 兼容 Safari 浏览器 */

            /* * 可选: 您可能还想加一个细微的边框来增强玻璃感

            border: 1px solid rgba(255, 255, 255, 0.2);

        /* 顶部左侧时钟样式 */
        .live-clock {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 8px;
            z-index: 9999;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            letter-spacing: 1px;
            transition: all 0.3s ease;
            user-select: none;
        }

        .live-clock:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: scale(1.02);
        }

        /* 鼠标水滴涟漪特效样式 */
        .ripple {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 99999;
            animation: ripple-animation 0.8s ease-out forwards;
        }

        @keyframes ripple-animation {
            0% {
                transform: scale(0);
                opacity: 0.8;
                border: 2px solid rgba(255, 255, 255, 0.8);
            }

            100% {
                transform: scale(3);
                opacity: 0;
                border: 2px solid rgba(255, 255, 255, 0);
            }
        }
    </style>

    <!-- 使用保罗 API (动态随机获取高质量必应/唯美壁纸) -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const panel = document.getElementById('panel');
            if (panel) {
                // 保罗 API：随机唯美/必应壁纸接口 (国内访问极速)
                // const randomImageUrl = 'https://api.paugram.com/bing/';
                const randomImageUrl = 'https://picsum.photos/1920/1080/';

                const img = new Image();
                img.onload = function () {
                    panel.style.backgroundImage = `url('${randomImageUrl}')`;
                    panel.style.backgroundSize = 'cover';
                    panel.style.backgroundPosition = 'center center';
                };
                img.src = randomImageUrl;
            }
        });
    </script>

    <!-- 时钟更新脚本 -->
    <script>
        function updateClock() {
            const clock = document.getElementById('live-clock');
            if (!clock) return;
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', { hour12: false });
            const dateString = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');

            // 可以根据需求选择显示星期几
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dayString = days[now.getDay()];

            clock.innerHTML = dateString + ' ' + dayString + ' ' + timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 鼠标水滴涟漪特效脚本
        document.addEventListener('click', function (e) {
            // 创建涟漪元素
            const ripple = document.createElement('div');
            ripple.className = 'ripple';

            // 设置初始大小和位置（以鼠标点击位置为中心）
            const size = 30; // 涟漪的初始直径
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - size / 2) + 'px';
            ripple.style.top = (e.clientY - size / 2) + 'px';

            // 将波纹添加到页面主体
            document.body.appendChild(ripple);

            // 动画结束后移除元素 (动画时间为0.8s)
            setTimeout(() => {
                ripple.remove();
            }, 800);
        });
    </script>
